services:
  db-legal:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=legallens
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin_pass

  backend-django:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8080
    volumes:
      - ./backend:/app
    depends_on:
      - db-legal
    environment:
      - DATABASE_URL=postgres://admin:admin_pass@db-legal:5432/legallens

  ai-engine:
    build: ./ai_engine
    volumes:
      - ./ai_engine:/app
    environment:
      - GOOGLE_API_KEY=AIzaSyAo2fMARqk545plY7M_tdIwai7TwUiB7o0

  nginx-proxy:
    image: nginx:latest
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - backend-django
      - ai-engine

volumes:
  postgres_data:
