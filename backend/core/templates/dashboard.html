<!-- dashboard.html simplificado -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<div class="container mt-5">
    <h2>LegalLens: Panel de Auditoría</h2>
    <nav class="navbar navbar-light bg-light px-4">
        <span class="navbar-brand">Bienvenido, {{ user.username }}</span>
        <form action="{% url 'logout' %}" method="post" style="display:inline;">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-secondary btn-sm">Cerrar Sesión</button>
        </form>
    </nav>
    <table class="table table-hover mt-4">
        <thead class="table-dark">
            <tr>
                <th>Cliente</th>
                <th>Tipo</th>
                <th>Riesgo</th>
                <th>DNI Detectados</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for c in contratos %}
            <tr>
                <td>{{ c.cliente }}</td>
                <td>{{ c.get_tipo_display }}</td>
                <td>
                    <span class="badge {% if c.riesgo == 'Medio' %}bg-warning{% elif c.riesgo == 'Critico' %}bg-danger{% else %}bg-success{% endif %}">
                        {{ c.riesgo }}
                    </span>
                </td>
                <td>{{ c.resultado_json.datos_clave.dni|join:", " }}</td>
                <td><a href="/admin/core/contratoauditado/{{c.id}}/change/" class="btn btn-sm btn-outline-primary">Ver Detalle</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
